<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Blog - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="bg-animate"></div>

  <main>
    <header>
      <h1>Horizon Blog</h1>
    </header>

    <div class="card-wrap">
      <div class="glass-card">
        <div class="card-header">
          <h2>Create Account</h2>
          <p>Join the Horizon community and start publishing.</p>
        </div>

        <form id="register-form">
          <div class="field">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Your name" autocomplete="name">
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="name@email.com" autocomplete="email">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Choose a secure password" autocomplete="new-password">
          </div>

          <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <p class="sign-in-text">
          Already a member? <a href="login.html">Sign In</a>
        </p>
      </div>
    </div>

    <footer>
      <p>Where thoughtful writing meets real readers.</p>
    </footer>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
