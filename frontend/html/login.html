<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Blog - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="bg-animate"></div>

  <main>
    <header>
      <h1>Horizon Blog</h1>
    </header>

    <div class="card-wrap">
      <div class="glass-card">
        <div class="card-header">
          <h2>Sign In</h2>
          <p>Continue reading, writing, and managing your stories.</p>
        </div>

        <form id="login-form">
          <div class="field">
            <label for="username">Email</label>
            <input id="username" type="email" placeholder="name@email.com" autocomplete="email">
          </div>

          <div class="field">
            <div class="field-row">
              <label for="password">Password</label>
            </div>
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
          </div>

          <button type="submit" class="btn-submit">Sign In</button>
        </form>
      </div>
    </div>

    <footer>
      <p class="join-text">
        New here? <a href="register.html">Create an account</a>
      </p>
    </footer>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
